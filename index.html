<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIRA — AI Udah Bener</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --user-bubble: #1e1b4b;
    --ai-bubble: #0f1a2e;
    --green: #10b981;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .mode-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }

  .tab {
    padding: 7px 14px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(124,58,237,0.4);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .msg.ai .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14.5px;
    max-width: calc(100% - 50px);
    word-break: break-word;
  }

  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,58,237,0.3);
    border-top-right-radius: 4px;
  }

  .bubble pre {
    background: #0d0d14;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .quick-prompts {
    padding: 0 20px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .qp {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
  }

  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
  }

  .input-box {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
  }

  #chat-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
  }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
  }
  .send-btn:disabled { opacity: 0.5; }

  /* code panel */
  .code-panel-inner { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .code-toolbar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .code-btn {
    padding: 7px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .code-btn.primary { background: var(--accent); color: #fff; }
  .code-workspace { flex: 1; display: flex; overflow: hidden; }
  .code-editor-col { flex: 1; display: flex; flex-direction: column; }
  #code-editor {
    flex: 1;
    background: #080810;
    border: none;
    outline: none;
    color: #a5f3fc;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 16px;
    resize: none;
  }
  .output-col { width: 45%; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
  #code-output {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
  }
  .code-ask-row {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid var(--border);
  }
  #code-ask-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px;
  }
  .output-error { color: var(--red); }
  .output-ai { color: var(--accent2); }

  /* game panel sederhana */
  .game-panel-inner {
    flex: 1;
    padding: 20px;
    text-align: center;
  }
  .game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    max-width: 600px;
    margin: 0 auto;
  }
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
  }
  #game-active {
    max-width: 600px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 20px;
    display: none;
  }
  #game-active.visible { display: block; }
  .game-header {
    padding: 14px 20px;
    background: var(--surface2);
    display: flex;
    justify-content: space-between;
  }
  .game-msgs {
    max-height: 300px;
    overflow-y: auto;
    padding: 12px;
    text-align: left;
  }
  .game-bubble {
    padding: 8px 12px;
    margin: 8px 0;
    border-radius: 12px;
  }
  .game-bubble.ai { background: var(--ai-bubble); }
  .game-bubble.user { background: var(--user-bubble); text-align: right; }
  .game-input-row { display: flex; gap: 8px; padding: 12px; }
  #game-text-input { flex: 1; background: var(--surface2); border: none; border-radius: 8px; color: white; padding: 8px; }
  .welcome { text-align: center; padding: 40px; }
  @media (max-width: 600px) {
    .tab span { display: none; }
    .code-workspace { flex-direction: column; }
    .output-col { width: 100%; height: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">KIRA</div>
  </div>
  <div class="mode-tabs">
    <button class="tab active" onclick="switchTab('chat')">💬 <span>Chat</span></button>
    <button class="tab" onclick="switchTab('code')">⌨️ <span>Koding</span></button>
    <button class="tab" onclick="switchTab('game')">🎮 <span>Main</span></button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="status-dot"></div>
    <span>Online</span>
  </div>
</header>

<div class="main">
  <!-- CHAT PANEL -->
  <div class="panel active" id="panel-chat">
    <div class="messages" id="messages">
      <div class="welcome">
        <div style="font-size:48px;">✨</div>
        <h2>KIRA siap membantu!</h2>
        <p>Coba tanya apa aja, dari coding sampai curhat.</p>
      </div>
    </div>
    <div class="quick-prompts">
      <button class="qp" onclick="sendQuick('Jelaskan neural network dengan santai')">🧠 Neural Network</button>
      <button class="qp" onclick="sendQuick('Buat fungsi bubble sort di Python')">🐍 Bubble Sort</button>
      <button class="qp" onclick="sendQuick('Tips jadi frontend developer handal')">💻 Frontend Tips</button>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="chat-input" rows="1" placeholder="Tanya ke KIRA..."></textarea>
        <button class="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>

  <!-- CODE PANEL -->
  <div class="panel" id="panel-code">
    <div class="code-panel-inner">
      <div class="code-toolbar">
        <button class="code-btn primary" onclick="analyzeCode()">🤖 Analisa Code</button>
        <button class="code-btn" onclick="fixCode()">🔧 Fix Bug</button>
        <button class="code-btn" onclick="explainCode()">📖 Jelaskan</button>
      </div>
      <div class="code-workspace">
        <div class="code-editor-col">
          <textarea id="code-editor" placeholder="Tulis code kamu di sini..."></textarea>
        </div>
        <div class="output-col">
          <div id="code-output">Hasil AI akan muncul di sini...</div>
          <div class="code-ask-row">
            <input type="text" id="code-ask-input" placeholder="Tanya tentang code..." onkeydown="if(event.key==='Enter') askCode()">
            <button class="code-btn primary" onclick="askCode()">Kirim</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- GAME PANEL -->
  <div class="panel" id="panel-game">
    <div class="game-panel-inner">
      <div id="game-selector">
        <h2>🎮 Pilih Game</h2>
        <div class="game-grid">
          <div class="game-card" onclick="startGame('tebak-kata')">🎯 Tebak Kata</div>
          <div class="game-card" onclick="startGame('trivia')">🧠 Trivia</div>
          <div class="game-card" onclick="startGame('cerita')">📖 Cerita Bareng</div>
          <div class="game-card" onclick="startGame('roast')">🔥 Roast Me</div>
        </div>
      </div>
      <div id="game-active">
        <div class="game-header">
          <span id="game-title-display">Game</span>
          <button onclick="exitGame()">← Kembali</button>
        </div>
        <div id="game-content">
          <div class="game-msgs" id="game-msgs"></div>
          <div class="game-input-row">
            <input type="text" id="game-text-input" placeholder="Ketik jawaban...">
            <button onclick="sendGameMsg()">Kirim</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ===================== 🔴 GANTI API KEY DI SINI 🔴 =====================
  const API_KEY = 'AIzaSyDSKxedohZDAUg6H-QcA8SwwoRcLXkFPjM';   // <-- GANTI DENGAN API KEY ASLI
  // ======================================================================

  const MODEL = 'gemini-1.5-flash';  // atau 'gemini-2.0-flash-exp'
  
  let chatHistory = []; // simpan percakapan
  let currentGame = null;
  let gameHistory = [];

  // Helper format teks
  function formatText(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // =============== PANGGIL GEMINI API (VERSI PALING SIMPEL) ===============
  async function callGemini(userMessage, systemPrompt = '', history = []) {
    // Build contents array sesuai format Gemini
    let contents = [];
    
    // Tambahkan system prompt sebagai pesan pertama jika ada
    if (systemPrompt) {
      contents.push({
        role: "user",
        parts: [{ text: `System: ${systemPrompt}` }]
      });
      contents.push({
        role: "model",
        parts: [{ text: "OK, saya akan mengikuti instruksi tersebut." }]
      });
    }
    
    // Tambahkan history (sudah dalam format {role, parts})
    for (let msg of history) {
      contents.push({
        role: msg.role === 'user' ? 'user' : 'model',
        parts: [{ text: msg.content }]
      });
    }
    
    // Tambahkan pesan user terbaru
    contents.push({
      role: "user",
      parts: [{ text: userMessage }]
    });

    const payload = { contents: contents };
    
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
    
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        let errorMsg = `HTTP ${response.status}`;
        if (errorData.error && errorData.error.message) errorMsg = errorData.error.message;
        throw new Error(errorMsg);
      }
      
      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("Tidak ada respons dari AI");
      return text;
    } catch (err) {
      console.error("API Error:", err);
      throw err;
    }
  }

  // =============== CHAT ===============
  function addMessage(role, text, container = 'messages') {
    const containerDiv = document.getElementById(container);
    const welcomeDiv = containerDiv.querySelector('.welcome');
    if (welcomeDiv) welcomeDiv.remove();
    
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerText = role === 'ai' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    containerDiv.appendChild(msgDiv);
    containerDiv.scrollTop = containerDiv.scrollHeight;
  }
  
  function showTyping() {
    const container = document.getElementById('messages');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'msg ai';
    typingDiv.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerText = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-indicator';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    typingDiv.appendChild(avatar);
    typingDiv.appendChild(bubble);
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
  }
  
  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }
  
  async function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage('user', text);
    chatHistory.push({ role: 'user', content: text });
    
    showTyping();
    try {
      const systemPrompt = "Kamu adalah KIRA, asisten AI yang ramah, lucu, dan suka bantu. Jawab dalam bahasa yang sama dengan user. Gunakan markdown sederhana jika perlu.";
      // Kirim dengan history (tanpa system prompt berulang)
      const reply = await callGemini(text, systemPrompt, chatHistory.slice(0, -1));
      hideTyping();
      addMessage('ai', reply);
      chatHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      hideTyping();
      addMessage('ai', `❌ Error: ${err.message}\n\nCoba periksa API key atau koneksi internet.`);
    }
  }
  
  function sendQuick(msg) {
    document.getElementById('chat-input').value = msg;
    sendChat();
  }
  
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  });
  
  // =============== CODE ===============
  function setCodeOutput(text, isError = false) {
    const out = document.getElementById('code-output');
    out.innerHTML = `<div class="${isError ? 'output-error' : 'output-ai'}">${escapeHtml(text)}</div>`;
  }
  
  async function runCodeAction(action, extra = '') {
    const code = document.getElementById('code-editor').value;
    if (!code && !extra) {
      setCodeOutput('Tulis code dulu!', true);
      return;
    }
    setCodeOutput('⏳ Memproses...');
    let prompt = extra;
    if (code) {
      prompt = `Code:\n\`\`\`\n${code}\n\`\`\`\n\n${action}`;
    }
    try {
      const reply = await callGemini(prompt, "Kamu adalah expert programmer. Jawab dengan jelas dan berikan contoh code jika perlu.");
      setCodeOutput(reply);
    } catch (err) {
      setCodeOutput(`Error: ${err.message}`, true);
    }
  }
  
  function analyzeCode() { runCodeAction('Analisa code ini: jelaskan fungsinya, beri saran perbaikan.'); }
  function fixCode() { runCodeAction('Perbaiki bug di code ini. Tampilkan code yang sudah diperbaiki.'); }
  function explainCode() { runCodeAction('Jelaskan code ini baris per baris dengan bahasa sederhana.'); }
  async function askCode() {
    const ask = document.getElementById('code-ask-input').value;
    if (!ask) return;
    document.getElementById('code-ask-input').value = '';
    const code = document.getElementById('code-editor').value;
    let prompt = ask;
    if (code) prompt += `\n\nCode yang sedang dikerjakan:\n\`\`\`\n${code}\n\`\`\``;
    setCodeOutput('⏳ Memproses...');
    try {
      const reply = await callGemini(prompt, "Kamu adalah asisten coding yang membantu.");
      setCodeOutput(reply);
    } catch (err) {
      setCodeOutput(`Error: ${err.message}`, true);
    }
  }
  
  // =============== GAMES ===============
  const gameConfigs = {
    'tebak-kata': { title: 'Tebak Kata', system: 'Kamu adalah game master tebak kata. Beri clue, user menebak. Jangan kasih jawaban langsung.' },
    'trivia': { title: 'Trivia', system: 'Kamu adalah quiz master. Beri pertanyaan pilihan ganda atau benar/salah.' },
    'cerita': { title: 'Cerita Bareng', system: 'Kamu adalah co-writer. Lanjutkan cerita dengan 2-3 kalimat.' },
    'roast': { title: 'Roast Me', system: 'Kamu adalah roast master yang lucu. Roast user dengan ringan dan kreatif.' }
  };
  
  async function startGame(gameId) {
    currentGame = gameId;
    gameHistory = [];
    document.getElementById('game-selector').style.display = 'none';
    const gameDiv = document.getElementById('game-active');
    gameDiv.classList.add('visible');
    document.getElementById('game-title-display').innerText = gameConfigs[gameId].title;
    document.getElementById('game-msgs').innerHTML = '';
    // Panggil AI untuk memulai game
    const startMsg = `Mulai game ${gameId}. Ikuti aturan: ${gameConfigs[gameId].system}. Berikan sambutan dan instruksi pertama.`;
    try {
      const reply = await callGemini(startMsg, "Kamu adalah game master yang seru.");
      addGameMsg('ai', reply);
      gameHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      addGameMsg('ai', `Error: ${err.message}`);
    }
  }
  
  function exitGame() {
    currentGame = null;
    document.getElementById('game-selector').style.display = 'block';
    document.getElementById('game-active').classList.remove('visible');
  }
  
  function addGameMsg(role, text) {
    const container = document.getElementById('game-msgs');
    const div = document.createElement('div');
    div.className = 'game-bubble ' + role;
    div.innerHTML = formatText(text);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
  
  async function sendGameMsg() {
    const input = document.getElementById('game-text-input');
    const text = input.value.trim();
    if (!text || !currentGame) return;
    input.value = '';
    addGameMsg('user', text);
    gameHistory.push({ role: 'user', content: text });
    // Panggil AI dengan konteks game
    const context = gameHistory.map(m => `${m.role === 'user' ? 'User' : 'AI'}: ${m.content}`).join('\n');
    const prompt = `Lanjutkan permainan ${currentGame}. Aturan: ${gameConfigs[currentGame].system}. \n\nPercakapan sebelumnya:\n${context}\n\nSekarang giliran AI merespon user: "${text}". Berikan respon yang sesuai sebagai game master.`;
    try {
      const reply = await callGemini(prompt, "Kamu adalah game master.");
      addGameMsg('ai', reply);
      gameHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      addGameMsg('ai', `Error: ${err.message}`);
    }
  }
  
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    event.currentTarget.classList.add('active');
  }
</script>
</body>
</html>
