<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniPlay V2.1 - Nonton Anime & Donghua Subtitle Indonesia</title>
    <meta name="description" content="AniPlay adalah platform streaming anime dan donghua subtitle Indonesia terlengkap. Tonton anime terbaru, episode terbaru, dan batch anime tamat secara gratis. Update setiap hari!">
    <meta name="keywords" content="nonton anime, anime sub indo, donghua sub indo, streaming anime, anime terbaru, batch anime, anime gratis, aniplay, nonton donghua, anime subtitle indonesia">
    <meta name="author" content="AniPlay">
    <meta name="theme-color" content="#060010">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg:        #060010;
    --bg2:       #0c0020;
    --card:      #100825;
    --card2:     #160f30;
    --line:      rgba(255,255,255,0.06);
    --line2:     rgba(255,255,255,0.1);
    --accent:    #C740FF;
    --accent2:   #FF4D9D;
    --accent3:   #7B2FFF;
    --cyan:      #00EEFF;
    --text:      #f0eaff;
    --sub:       #8a80b0;
    --muted:     #4a4468;
    --red:       #ff4d6d;
    --green:     #00e5a0;
    --font:      'Nunito', sans-serif;
    --font2:     'Rajdhani', sans-serif;
}

*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body { min-height: 100vh; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    position: relative;
    overflow-x: hidden;
}

/* === ANIMATED BACKGROUND === */
.bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
}

.bg-canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 70% 60% at 15% 5%, rgba(199,64,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 95%, rgba(255,77,157,0.15) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(123,47,255,0.08) 0%, transparent 60%);
}

/* floating orbs */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: floatOrb 8s ease-in-out infinite;
    opacity: 0.35;
}
.orb1 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, #C740FF, transparent);
    top: -80px; left: -80px;
    animation-delay: 0s;
}
.orb2 {
    width: 220px; height: 220px;
    background: radial-gradient(circle, #FF4D9D, transparent);
    bottom: -60px; right: -60px;
    animation-delay: -3s;
}
.orb3 {
    width: 160px; height: 160px;
    background: radial-gradient(circle, #00EEFF, transparent);
    top: 40%; right: 10%;
    animation-delay: -5s;
    opacity: 0.18;
}

@keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(20px, -20px) scale(1.05); }
    66%       { transform: translate(-15px, 15px) scale(0.97); }
}

/* grid overlay */
.bg-grid {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(199,64,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(199,64,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
}

/* scan line shimmer */
.scanline {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(199,64,255,0.4), rgba(0,238,255,0.4), transparent);
    animation: scan 6s linear infinite;
    top: -2px;
}
@keyframes scan {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
}

/* === CARD === */
.card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid rgba(199,64,255,0.2);
    border-radius: 24px;
    padding: 36px 28px 30px;
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.7),
        0 0 40px rgba(199,64,255,0.08);
    backdrop-filter: blur(12px);
    animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
}

@keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* corner accents */
.card::before, .card::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
}
.card::before {
    top: 14px; left: 14px;
    border-width: 2px 0 0 2px;
    border-radius: 4px 0 0 0;
}
.card::after {
    bottom: 14px; right: 14px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 4px 0;
}

/* === LOGO === */
.logo-wrap {
    text-align: center;
    margin-bottom: 26px;
}

.logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

.logo-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    box-shadow: 0 8px 28px rgba(199,64,255,0.45), 0 0 0 1px rgba(255,255,255,0.1) inset;
    animation: iconPulse 3s ease-in-out infinite;
    flex-shrink: 0;
}

@keyframes iconPulse {
    0%, 100% { box-shadow: 0 8px 28px rgba(199,64,255,0.45), 0 0 0 1px rgba(255,255,255,0.1) inset; }
    50%       { box-shadow: 0 8px 36px rgba(199,64,255,0.7), 0 0 0 1px rgba(255,255,255,0.15) inset; }
}

.logo-text-wrap {
    text-align: left;
}

.logo-name {
    font-family: var(--font2);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    text-transform: uppercase;
}

.logo-version {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 1px;
}

.logo-tagline {
    font-size: 12px;
    color: var(--sub);
    margin-top: 10px;
    letter-spacing: 0.3px;
}

/* === DIVIDER === */
.divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line2), transparent);
}

/* === GOOGLE BUTTON === */
.btn-google {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: all .25s;
    text-decoration: none;
    position: relative;
    overflow: hidden;
}
.btn-google::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(199,64,255,0.08), rgba(255,77,157,0.08));
    opacity: 0;
    transition: opacity .25s;
}
.btn-google:hover::before { opacity: 1; }
.btn-google:hover { border-color: rgba(199,64,255,0.3); transform: translateY(-1px); }
.btn-google:active { transform: scale(.98); }
.btn-google img { width: 18px; height: 18px; }

/* === FORM === */
.form-group { margin-bottom: 14px; }

label {
    display: block;
    font-size: 10px;
    font-weight: 800;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
}

.input-wrap { position: relative; }
.input-wrap i {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
    transition: color .2s;
}

input[type=email],
input[type=password],
input[type=text] {
    width: 100%;
    padding: 12px 13px 12px 40px;
    background: var(--card2);
    border: 1px solid var(--line2);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
}

input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(199,64,255,0.12);
}
input:focus + i,
.input-wrap:focus-within i { color: var(--accent); }
input::placeholder { color: var(--muted); }

/* Eye toggle */
.eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    padding: 4px;
    transition: color .2s;
}
.eye-btn:hover { color: var(--accent); }

/* === SUBMIT BUTTON === */
.btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: var(--font2);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .25s;
    margin-top: 6px;
    box-shadow: 0 6px 24px rgba(199,64,255,0.4);
    position: relative;
    overflow: hidden;
}
.btn-submit::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: left .5s;
}
.btn-submit:hover::after { left: 130%; }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(199,64,255,0.55); }
.btn-submit:active { transform: scale(.98); opacity: .9; }
.btn-submit:disabled { opacity: .55; pointer-events: none; }

/* === ALERT === */
.alert {
    padding: 11px 13px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.alert-err { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.25); color: var(--red); }
.alert-ok  { background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2);  color: var(--green); }

/* === FOOTER === */
.card-foot {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--sub);
}
.card-foot a {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
    position: relative;
}
.card-foot a::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform .2s;
}
.card-foot a:hover::after { transform: scaleX(1); }

/* forgot */
.forgot { text-align: right; margin-top: 5px; }
.forgot a {
    font-size: 11px;
    color: var(--sub);
    text-decoration: none;
    font-weight: 600;
    transition: color .2s;
}
.forgot a:hover { color: var(--accent); }

/* === SPINNER === */
.spin {
    display: inline-block;
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: sp .65s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* === BADGES ROW === */
.feature-badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 22px;
    flex-wrap: wrap;
}
.badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1px solid;
}
.badge-purple {
    background: rgba(199,64,255,0.1);
    border-color: rgba(199,64,255,0.25);
    color: var(--accent);
}
.badge-pink {
    background: rgba(255,77,157,0.1);
    border-color: rgba(255,77,157,0.25);
    color: var(--accent2);
}
.badge-cyan {
    background: rgba(0,238,255,0.07);
    border-color: rgba(0,238,255,0.2);
    color: var(--cyan);
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
    <div class="bg-grid"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="scanline"></div>
</div>

<div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
        <div class="logo-badge">
            <div class="logo-icon">
                <i class="fa fa-play"></i>
            </div>
            <div class="logo-text-wrap">
                <span class="logo-name">AniPlay</span>
                <div class="logo-version">Version 2.1</div>
            </div>
        </div>
        <div class="logo-tagline">Masuk ke akun kamu untuk mulai nonton</div>
    </div>

    <!-- Feature badges -->
    <div class="feature-badges">
        <span class="badge badge-purple"><i class="fa fa-bolt"></i> HD Streaming</span>
        <span class="badge badge-pink"><i class="fa fa-closed-captioning"></i> Sub Indo</span>
        <span class="badge badge-cyan"><i class="fa fa-fire"></i> Update Harian</span>
    </div>

    <!-- Google Login -->
    <a class="btn-google" href="https://accounts.google.com/o/oauth2/v2/auth?client_id=651610260761-7r224afv8p6grktfm8uqcuflgs5o4sb8.apps.googleusercontent.com&redirect_uri=https%3A%2F%2Fstenly.org%2Fauth%2Fgoogle%2Fcallback.php&response_type=code&scope=openid+email+profile&state=eyJyZWRpcmVjdCI6IlwvIiwiY3NyZiI6IjRhNTRlOTAxYWZhZjM3MTgzNzYzODY4MTA3NDQzZGQyIn0%3D&prompt=select_account">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        Lanjutkan dengan Google
    </a>

    <div class="divider">atau email</div>

    <!-- Email Form -->
    <form method="POST" id="loginForm">
        <input type="hidden" name="redirect" value="/">

        <div class="form-group">
            <label>Alamat Email</label>
            <div class="input-wrap">
                <i class="fa fa-envelope"></i>
                <input type="email" name="email" placeholder="nama@email.com" autocomplete="email" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa fa-lock"></i>
                <input type="password" name="password" id="passInput" placeholder="••••••••" autocomplete="current-password" required>
                <button type="button" class="eye-btn" onclick="togglePass()">
                    <i class="fa fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <div class="forgot"><a href="#">Lupa password?</a></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            Masuk Sekarang
        </button>
    </form>

    <div class="card-foot">
        Belum punya akun? <a href="/auth/register/?redirect=%2F">Daftar Gratis</a>
    </div>
</div>

<script>
function togglePass() {
    const inp = document.getElementById('passInput');
    const ico = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'fa fa-eye-slash';
    } else {
        inp.type = 'password';
        ico.className = 'fa fa-eye';
    }
}

document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Memuat...';
});
</script>

</body>
</html>
