<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONGHUAVERSE — Nonton Donghua Online</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Noto+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060e;
    --bg2: #0d0d1f;
    --card: #111127;
    --card2: #16162e;
    --accent: #e8a020;
    --accent2: #ff6b35;
    --red: #e83535;
    --text: #f0ede6;
    --muted: #8585a8;
    --border: rgba(232,160,32,0.15);
    --glow: rgba(232,160,32,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* BACKGROUND TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 40% at 20% 0%, rgba(232,160,32,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,107,53,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(6,6,14,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 60px;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    flex-shrink: 0;
  }

  .logo span {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    -webkit-text-fill-color: var(--muted);
    letter-spacing: 1px;
  }

  .search-wrap {
    flex: 1;
    max-width: 400px;
    margin-left: auto;
    position: relative;
  }

  #search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 40px 8px 14px;
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  .search-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 12px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* SECTION HEADER */
  .sec-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .sec-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }

  .sec-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 18px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    border-radius: 2px;
    margin-right: 10px;
    vertical-align: middle;
  }

  .sec-badge {
    background: rgba(232,160,32,0.12);
    color: var(--accent);
    font-size: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(232,160,32,0.2);
  }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--card2);
    position: relative;
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .card:hover .card-thumb img { transform: scale(1.05); }

  .card-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    color: var(--border);
    background: linear-gradient(135deg, var(--card2), var(--card));
  }

  .card-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--red);
    color: #fff;
    font-size: 9px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .card-eps {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.75);
    color: var(--accent);
    font-size: 9px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    backdrop-filter: blur(4px);
  }

  .card-info {
    padding: 10px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .card-genre {
    font-size: 10px;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* SCHEDULE SECTION */
  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 36px;
  }

  .sched-day {
    background: var(--card);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .sched-day-header {
    background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(255,107,53,0.1));
    padding: 6px 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
    text-align: center;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .sched-items { padding: 6px; }

  .sched-item {
    font-size: 10px;
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.3;
  }

  .sched-item:hover { background: rgba(232,160,32,0.1); color: var(--accent); }

  /* DETAIL MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    backdrop-filter: blur(8px);
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 92vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-bottom: none;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    gap: 16px;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-poster {
    width: 90px;
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 3/4;
    background: var(--card);
  }

  .modal-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .modal-meta { flex: 1; }

  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .modal-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  .genre-chip {
    background: rgba(232,160,32,0.1);
    color: var(--accent);
    font-size: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid rgba(232,160,32,0.2);
    letter-spacing: 0.5px;
  }

  .modal-stats {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--muted);
  }

  .modal-stats span { display: flex; align-items: center; gap: 4px; }

  .modal-body { padding: 16px 20px; }

  .modal-synopsis {
    font-size: 13px;
    line-height: 1.7;
    color: #b8b8cc;
    margin-bottom: 20px;
  }

  .ep-section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .ep-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 6px;
    max-height: 240px;
    overflow-y: auto;
  }

  .ep-btn {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 4px;
    font-size: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .ep-btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* VIDEO PLAYER MODAL */
  .player-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 300;
    flex-direction: column;
  }

  .player-overlay.open { display: flex; }

  .player-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.8);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  .player-back {
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  .player-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .player-ep-info {
    font-size: 12px;
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
  }

  .player-frame {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .player-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .player-loading {
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-align: center;
  }

  .player-loading::after {
    content: '';
    display: block;
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 12px auto 0;
    animation: loadbar 1.2s ease-in-out infinite;
  }

  @keyframes loadbar {
    0%,100% { transform: scaleX(0.3); opacity: 0.4; }
    50% { transform: scaleX(1); opacity: 1; }
  }

  /* LOADING / STATES */
  .loading-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .skeleton-card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .skeleton-thumb {
    aspect-ratio: 3/4;
    background: var(--card2);
  }

  .skeleton-info { padding: 10px; }
  .skeleton-line { height: 10px; background: var(--card2); border-radius: 4px; margin-bottom: 6px; }
  .skeleton-line.short { width: 60%; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .error-msg .icon { font-size: 36px; margin-bottom: 8px; }

  /* SEARCH RESULTS */
  #search-results-section { display: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 500;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .schedule-grid { grid-template-columns: repeat(4, 1fr); }
    .sched-day:nth-child(n+5) { display: none; }
    .cards-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    DONGHUA<span>界</span>
  </div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Cari donghua...">
    <button class="search-btn" onclick="doSearch()">⌕</button>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('home', this)">Home</button>
  <button class="nav-tab" onclick="switchTab('schedule', this)">Jadwal</button>
  <button class="nav-tab" onclick="switchTab('search', this)">Cari</button>
</nav>

<main>
  <!-- HOME TAB -->
  <div id="tab-home">
    <div class="sec-header">
      <div class="sec-title">🔥 Popular</div>
      <span class="sec-badge">SLIDER</span>
    </div>
    <div id="popular-grid" class="cards-grid"></div>

    <div class="sec-header">
      <div class="sec-title">⚡ Terbaru</div>
      <span class="sec-badge">UPDATE</span>
    </div>
    <div id="latest-grid" class="cards-grid"></div>

    <div class="sec-header">
      <div class="sec-title">✅ Tamat</div>
      <span class="sec-badge">COMPLETED</span>
    </div>
    <div id="completed-grid" class="cards-grid"></div>
  </div>

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" style="display:none">
    <div class="sec-header">
      <div class="sec-title">📅 Jadwal Rilis Mingguan</div>
    </div>
    <div id="schedule-grid" class="schedule-grid"></div>
  </div>

  <!-- SEARCH TAB -->
  <div id="tab-search" style="display:none">
    <div class="sec-header">
      <div class="sec-title">🔍 Hasil Pencarian</div>
    </div>
    <div id="search-grid" class="cards-grid">
      <div class="error-msg"><div class="icon">🔍</div>Ketik sesuatu untuk mencari</div>
    </div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" id="modal-content">
    <div class="modal-header">
      <div class="modal-poster" id="modal-poster"></div>
      <div class="modal-meta">
        <div class="modal-title" id="modal-title">Loading...</div>
        <div class="modal-genres" id="modal-genres"></div>
        <div class="modal-stats" id="modal-stats"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-synopsis" id="modal-synopsis"></div>
      <div class="ep-section-title">EPISODE LIST</div>
      <div class="ep-grid" id="ep-grid"></div>
    </div>
  </div>
</div>

<!-- PLAYER MODAL -->
<div class="player-overlay" id="player-modal">
  <div class="player-topbar">
    <button class="player-back" onclick="closePlayer()">←</button>
    <div class="player-title" id="player-title">Loading...</div>
    <div class="player-ep-info" id="player-ep-info"></div>
  </div>
  <div class="player-frame" id="player-frame">
    <div class="player-loading">MEMUAT VIDEO</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://api.app.orbitcloud.web.id/api/v1';
const KEY = '0fb021e0e8889edf914200a3f6d1d142e74eb57f14eda903';
const H = { 'x-api-key': KEY, 'Content-Type': 'application/json' };

let currentSlug = '';
let currentTitle = '';

// ======= FETCH HELPERS =======
async function apiFetch(url, opts = {}) {
  const res = await fetch(url, { headers: H, ...opts });
  if (!res.ok) throw new Error('API Error ' + res.status);
  return res.json();
}

// ======= SKELETON =======
function makeSkeleton(n = 6) {
  return Array(n).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton-thumb"></div>
      <div class="skeleton-info">
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>`).join('');
}

// ======= CARD =======
function makeCard(item, badgeLabel = '') {
  const thumb = item.thumb || item.thumbnail || item.cover || item.image || '';
  const title = item.title || item.name || 'Tanpa Judul';
  const genre = Array.isArray(item.genre) ? item.genre.slice(0,2).join(', ') : (item.genre || '');
  const eps = item.episode_count || item.total_episode || item.episodes || '';
  const slug = item.slug || item.id || '';

  return `
    <div class="card" onclick="openDetail('${slug}', '${escHtml(title)}')">
      <div class="card-thumb">
        ${thumb ? `<img src="${thumb}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-thumb-placeholder>界</div>'">` : '<div class="card-thumb-placeholder">界</div>'}
        ${badgeLabel ? `<div class="card-badge">${badgeLabel}</div>` : ''}
        ${eps ? `<div class="card-eps">EP ${eps}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(title)}</div>
        ${genre ? `<div class="card-genre">${escHtml(genre)}</div>` : ''}
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ======= HOME =======
async function loadHome() {
  const grids = ['popular-grid','latest-grid','completed-grid'];
  grids.forEach(id => { document.getElementById(id).innerHTML = makeSkeleton(6); });

  try {
    const data = await apiFetch(`${API}/home?pages=2`);
    const popular = data.popular || data.slider || [];
    const latest = data.latest || data.terbaru || [];
    const completed = data.completed || data.tamat || [];

    document.getElementById('popular-grid').innerHTML = 
      popular.length ? popular.map(i => makeCard(i, 'HOT')).join('') : '<div class="error-msg"><div class="icon">📭</div>Tidak ada data</div>';
    document.getElementById('latest-grid').innerHTML = 
      latest.length ? latest.map(i => makeCard(i, 'NEW')).join('') : '<div class="error-msg"><div class="icon">📭</div>Tidak ada data</div>';
    document.getElementById('completed-grid').innerHTML = 
      completed.length ? completed.map(i => makeCard(i)).join('') : '<div class="error-msg"><div class="icon">📭</div>Tidak ada data</div>';
  } catch(e) {
    grids.forEach(id => {
      document.getElementById(id).innerHTML = '<div class="error-msg"><div class="icon">⚠️</div>Gagal memuat data. Coba refresh.</div>';
    });
  }
}

// ======= SCHEDULE =======
async function loadSchedule() {
  const container = document.getElementById('schedule-grid');
  container.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);font-size:13px;text-align:center;padding:24px">Memuat jadwal...</div>';

  try {
    const data = await apiFetch(`${API}/schedule`);
    const days = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
    const keys = Object.keys(data);

    if (!keys.length) throw new Error('empty');

    container.innerHTML = keys.map(day => {
      const items = Array.isArray(data[day]) ? data[day] : [];
      return `
        <div class="sched-day">
          <div class="sched-day-header">${day}</div>
          <div class="sched-items">
            ${items.length ? items.map(i => {
              const slug = i.slug || i.id || '';
              const title = i.title || i.name || 'Tanpa Judul';
              return `<div class="sched-item" onclick="openDetail('${escHtml(slug)}','${escHtml(title)}')">${escHtml(title)}</div>`;
            }).join('') : '<div class="sched-item" style="color:var(--muted)">-</div>'}
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="error-msg" style="grid-column:1/-1"><div class="icon">⚠️</div>Gagal memuat jadwal</div>';
  }
}

// ======= DETAIL =======
async function openDetail(slug, title) {
  if (!slug) return;
  currentSlug = slug;
  currentTitle = title;

  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-poster').innerHTML = '<div style="width:100%;height:100%;background:var(--card2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--border)">界</div>';
  document.getElementById('modal-genres').innerHTML = '';
  document.getElementById('modal-stats').innerHTML = '<span>⏳ Memuat info...</span>';
  document.getElementById('modal-synopsis').textContent = '';
  document.getElementById('ep-grid').innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;grid-column:1/-1">Memuat episode...</div>';
  document.getElementById('detail-modal').classList.add('open');

  try {
    const data = await apiFetch(`${API}/detail/${slug}`);

    const thumb = data.thumb || data.thumbnail || data.cover || data.image || '';
    const genres = Array.isArray(data.genre) ? data.genre : (data.genre ? [data.genre] : []);
    const eps = data.episodes || data.episode_list || data.ep_list || [];
    const synopsis = data.synopsis || data.description || data.sinopsis || 'Tidak ada sinopsis tersedia.';
    const status = data.status || '';
    const total = data.total_episode || data.episode_count || eps.length || '';

    if (thumb) {
      document.getElementById('modal-poster').innerHTML = `<img src="${thumb}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<div style=width:100%;height:100%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--border)>界</div>'">`;
    }

    document.getElementById('modal-title').textContent = data.title || title;
    document.getElementById('modal-genres').innerHTML = genres.map(g => `<span class="genre-chip">${escHtml(g)}</span>`).join('');
    document.getElementById('modal-stats').innerHTML = `
      ${total ? `<span>🎬 ${total} Eps</span>` : ''}
      ${status ? `<span>📌 ${escHtml(status)}</span>` : ''}
    `;
    document.getElementById('modal-synopsis').textContent = synopsis;

    if (eps.length) {
      document.getElementById('ep-grid').innerHTML = eps.map(ep => {
        const epSlug = ep.slug || ep.id || ep.ep_slug || '';
        const epNum = ep.episode || ep.ep || ep.number || ep.title || '';
        return `<button class="ep-btn" onclick="playEp('${escHtml(epSlug)}', '${escHtml(String(epNum))}')">EP ${escHtml(String(epNum))}</button>`;
      }).join('');
    } else {
      document.getElementById('ep-grid').innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;grid-column:1/-1">Belum ada episode</div>';
    }
  } catch(e) {
    showToast('Gagal memuat detail: ' + e.message);
    document.getElementById('modal-stats').innerHTML = '<span style="color:var(--red)">Gagal memuat</span>';
  }
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('open');
}

// ======= PLAYER =======
async function playEp(epSlug, epNum) {
  if (!epSlug) { showToast('Episode tidak tersedia'); return; }

  document.getElementById('player-title').textContent = currentTitle;
  document.getElementById('player-ep-info').textContent = 'EP ' + epNum;
  document.getElementById('player-frame').innerHTML = '<div class="player-loading">MEMUAT VIDEO</div>';
  document.getElementById('player-modal').classList.add('open');

  try {
    const data = await apiFetch(`${API}/episode/${epSlug}`);
    const url = data.url || data.stream_url || data.link || data.iframe || data.embed || data.source || '';
    
    if (!url) throw new Error('URL tidak ditemukan');

    // Try iframe embed
    document.getElementById('player-frame').innerHTML = 
      `<iframe src="${escHtml(url)}" allowfullscreen allow="autoplay; fullscreen" style="width:100%;height:100%;border:none"></iframe>`;
  } catch(e) {
    document.getElementById('player-frame').innerHTML = `
      <div class="player-loading" style="padding:20px">
        <div>⚠️ Gagal memuat video</div>
        <div style="font-size:11px;margin-top:8px;color:var(--muted)">${e.message}</div>
      </div>`;
  }
}

function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-frame').innerHTML = '<div class="player-loading">MEMUAT VIDEO</div>';
}

// ======= SEARCH =======
let searchTimer;
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = document.getElementById('search-input').value.trim();
    if (q.length >= 2) {
      switchTab('search', document.querySelectorAll('.nav-tab')[2]);
      doSearch();
    }
  }, 600);
});

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  switchTab('search', document.querySelectorAll('.nav-tab')[2]);
  const grid = document.getElementById('search-grid');
  grid.innerHTML = makeSkeleton(6);

  try {
    const data = await apiFetch(`${API}/search?q=${encodeURIComponent(q)}&pages=3`);
    const results = data.results || data.data || data.items || (Array.isArray(data) ? data : []);
    
    if (!results.length) {
      grid.innerHTML = '<div class="error-msg"><div class="icon">🔍</div>Tidak ada hasil untuk "' + escHtml(q) + '"</div>';
      return;
    }

    grid.innerHTML = results.map(i => makeCard(i)).join('');
  } catch(e) {
    grid.innerHTML = '<div class="error-msg"><div class="icon">⚠️</div>Gagal mencari: ' + escHtml(e.message) + '</div>';
  }
}

// ======= TABS =======
let schedLoaded = false;

function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('tab-home').style.display = tab === 'home' ? '' : 'none';
  document.getElementById('tab-schedule').style.display = tab === 'schedule' ? '' : 'none';
  document.getElementById('tab-search').style.display = tab === 'search' ? '' : 'none';

  if (tab === 'schedule' && !schedLoaded) {
    schedLoaded = true;
    loadSchedule();
  }
}

// ======= TOAST =======
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ======= CLOSE ON OVERLAY CLICK =======
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-modal')) closeDetail();
});

// ======= INIT =======
loadHome();
</script>
</body>
</html>
